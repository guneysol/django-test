{% extends "base.html" %}

{% block title %}Sign up · BookNest{% endblock %}

{% block content %}
<div class="form-card">
  <h1>Create your account</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary btn-block" type="submit">Sign up</button>
  </form>
  <p class="muted">Already a member? <a href="{% url 'login' %}">Log in</a>.</p>
</div>
{% endblock %}
