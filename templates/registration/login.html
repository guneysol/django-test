{% extends "base.html" %}

{% block title %}Log in · BookNest{% endblock %}

{% block content %}
<div class="form-card">
  <h1>Log in</h1>
  {% if form.errors %}
    <div class="alert alert-error">Your username and password didn't match. Please try again.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="next" value="{{ next }}">
    <button class="btn btn-primary btn-block" type="submit">Log in</button>
  </form>
  <p class="muted">No account yet? <a href="{% url 'accounts:signup' %}">Create one</a>.</p>
</div>
{% endblock %}
